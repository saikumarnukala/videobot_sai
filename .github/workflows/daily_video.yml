# ============================================================
#  FACELESS VIDEO BOT – Daily GitHub Actions Automation
# ============================================================
#
#  Runs 3 times per day and posts a YouTube Short automatically.
#
#  REQUIRED GitHub Secrets (Settings → Secrets → Actions):
#  ─────────────────────────────────────────────────────────
#  GEMINI_API_KEY               – Google Gemini API key
#  PEXELS_API_KEY               – Pexels API key
#  JAMENDO_CLIENT_ID            – Jamendo Client ID
#  YOUTUBE_CLIENT_SECRETS_JSON  – Full contents of client_secrets.json
#  YOUTUBE_TOKEN_JSON           – Full contents of token.json
#                                 (run locally first to generate it)
#
#  OPTIONAL GitHub Secrets:
#  YOUTUBE_PRIVACY              – "public" | "unlisted" | "private"
#                                 (defaults to "public")
# ============================================================

name: Daily Faceless Video Bot

on:
  schedule:
    - cron: '0 7 * * *'    # Morning   – 7:00 AM UTC  → morning topics
    - cron: '0 11 * * *'   # News      – 11:00 AM UTC → breaking news
    - cron: '0 13 * * *'   # Afternoon – 1:00 PM UTC  → afternoon topics
    - cron: '0 19 * * *'   # Evening   – 7:00 PM UTC  → evening topics

  # Manual trigger: optionally override slot and/or topic
  workflow_dispatch:
    inputs:
      slot:
        description: 'Time slot (morning / afternoon / evening / news)'
        required: false
        default: ''
      topic:
        description: 'Specific topic override (leave blank to auto-select)'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # Generous timeout for video rendering
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Suppress Node.js 20 deprecation warning

    steps:
      # ── 1. Source code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python environment ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System dependencies ────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── 4. Python packages ────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Restore YouTube OAuth credentials from secrets ─────────────
      - name: Restore YouTube credentials
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          printf '%s' "$CLIENT_SECRETS" > client_secrets.json
          printf '%s' "$TOKEN_JSON" > token.json

      # ── 5b. Restore voice sample (optional – for Coqui free voice clone) ─
      # To use: encode your WAV as base64 → store as VOICE_SAMPLE_B64 secret
      #   PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("my_voice.wav")) | clip
      - name: Restore voice sample
        if: ${{ secrets.VOICE_SAMPLE_B64 != '' }}
        env:
          VOICE_B64: ${{ secrets.VOICE_SAMPLE_B64 }}
        run: |
          mkdir -p assets
          printf '%s' "$VOICE_B64" | base64 -d > assets/my_voice.wav
          echo "COQUI_VOICE_SAMPLE=assets/my_voice.wav" >> $GITHUB_ENV

      # ── 6. Choose topic ───────────────────────────────────────────────
      - name: Select topic for this run
        id: topic_select
        run: |
          OVERRIDE_TOPIC="${{ github.event.inputs.topic }}"
          OVERRIDE_SLOT="${{ github.event.inputs.slot }}"

          if [ -n "$OVERRIDE_TOPIC" ]; then
            # Manual dispatch with an explicit topic
            echo "topic=$OVERRIDE_TOPIC" >> "$GITHUB_OUTPUT"
            echo "use_news=false" >> "$GITHUB_OUTPUT"
          elif [ "$OVERRIDE_SLOT" = "news" ]; then
            echo "topic=" >> "$GITHUB_OUTPUT"
            echo "use_news=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$OVERRIDE_SLOT" ]; then
            # Manual dispatch with a specific slot
            TOPIC=$(python select_topic.py --slot "$OVERRIDE_SLOT")
            echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
            echo "use_news=false" >> "$GITHUB_OUTPUT"
          else
            # Scheduled run – detect if breaking news hour (11 AM UTC)
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "11" ]; then
              echo "topic=" >> "$GITHUB_OUTPUT"
              echo "use_news=true" >> "$GITHUB_OUTPUT"
            else
              TOPIC=$(python select_topic.py)
              echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
              echo "use_news=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── 7. Run the full pipeline ──────────────────────────────────────
      - name: Generate video and upload to YouTube
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          JAMENDO_CLIENT_ID:  ${{ secrets.JAMENDO_CLIENT_ID }}
          UPLOAD_TO_YOUTUBE:  "true"
          VIDEO_LENGTH_SECONDS: "55"
          YOUTUBE_PRIVACY:    ${{ secrets.YOUTUBE_PRIVACY || 'public' }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.topic_select.outputs.use_news }}" = "true" ]; then
            python main.py --news
          else
            python main.py --topic "${{ steps.topic_select.outputs.topic }}"
          fi

      # ── 8. Clean up (always runs, even on failure) ────────────────────
      - name: Clean up temp files
        if: always()
        run: |
          rm -f temp_audio.mp3 temp_subs.json bg_music.mp3 final_short.mp4
          rm -f temp_bg_*.mp4 token.json client_secrets.json
